<!DOCTYPE html>
<html>
<head>
<style>
.tooltip{position:relative;}
.tooltip span{
 visibility:hidden;background:black;color:white;
 position:absolute;top:-30px;
}
.tooltip:hover span{visibility:visible;}
</style>
</head>
<body>
<div class="tooltip">Hover<span>Tooltip</span></div>
</body>
</html>
