<!DOCTYPE html>
<html>
<head>
<style>
.loader{
  border:5px solid #ccc;
  border-top:5px solid blue;
  border-radius:50%;
  width:50px;height:50px;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loader"></div>
</body>
</html>
