<!DOCTYPE html>
<html>
<head>
<style>
ul{display:flex;list-style:none;background:black;}
li{padding:10px;color:white;position:relative;}
li::after{
  content:'';height:2px;background:red;width:0;position:absolute;bottom:0;left:0;transition:0.5s;
}
li:hover::after{width:100%;}
</style>
</head>
<body>
<ul><li>Home</li><li>About</li></ul>
</body>
</html>
